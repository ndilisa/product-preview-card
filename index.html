<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Product preview card component</title>
  </head>

  <body>
    <main class="container">
      <img
        src="image-product-desktop.jpg"
        alt="Gabrielle Essence Eau De Parfum"
        class="product-image"
      />
      <div class="content">
        <p class="category">P E R F U M E</p>
        <h1 class="product-title">Gabrielle Essence Eau De Parfum</h1>

        <p class="product-description">
          A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="price-container">
          <p class="price-new">$149.99</p>
          <p class="price-original">$169.99</p>
        </div>

        <button class="add-to-cart">
          <img src="icon-cart.svg" alt="cart icon" />
          Add to Cart
        </button>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/ndilisa">Ndilisa Kula</a>.
    </footer>
  </body>
</html>
